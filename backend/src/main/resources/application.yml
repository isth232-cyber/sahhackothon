server:
  port: ${SERVER_PORT:8082}

spring:
  application:
    name: sahapathi-ai

  datasource:
    url: ${SPRING_DATASOURCE_URL:${DATABASE_URL:jdbc:postgresql://localhost:5437/postgres}}
    username: ${SPRING_DATASOURCE_USERNAME:${DATABASE_USERNAME:postgres}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DATABASE_PASSWORD:Siva@123}}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: false

app:
  jwt:
    secret: ${APP_JWT_SECRET:${JWT_SECRET:dev-jwt-secret-dev-jwt-secret-dev-jwt-secret}}
    expiration-ms: 86400000 # 24 hours
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
  ai:
    provider: ${AI_PROVIDER:mock}   # set to 'gemini' to use real AI
    gemini:
      api-key: ${GEMINI_API_KEY:}

logging:
  level:
    root: INFO
    com.sahapathi.ai: DEBUG
